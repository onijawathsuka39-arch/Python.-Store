<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Bill - Python Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Anta&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #DC143C;
            --black: #000;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #fff;
            font-family: 'Anta', sans-serif;
            color: #000;
            padding: 40px;
        }
        .bill-container {
            max-width: 800px;
            margin: 0 auto;
            border: 2px solid #eee;
            padding: 40px;
            border-radius: 15px;
        }
        .bill-header {
            text-align: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 30px;
            margin-bottom: 30px;
        }
        .bill-header img {
            height: 80px;
            margin-bottom: 15px;
        }
        .bill-header h1 {
            font-size: 2.5rem;
            letter-spacing: 5px;
            font-weight: 900;
        }
        .bill-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            font-size: 1rem;
        }
        .cust-details h3 {
            color: var(--primary);
            font-size: 1.2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .order-details {
            text-align: right;
        }
        .item-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        .item-table th {
            text-align: left;
            background: #f9f9f9;
            padding: 12px;
            border-bottom: 2px solid #eee;
        }
        .item-table td {
            padding: 15px 12px;
            border-bottom: 1px solid #eee;
        }
        .item-box {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .item-box img {
            width: 50px;
            height: 50px;
            border-radius: 5px;
            object-fit: cover;
        }
        .totals-box {
            margin-left: auto;
            width: 300px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
        }
        .total-row.final {
            border-top: 2px solid #000;
            margin-top: 10px;
            padding-top: 15px;
            font-weight: 900;
            font-size: 1.4rem;
            color: var(--primary);
        }
        .payment-method {
            margin-top: 40px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
            font-weight: 800;
            text-align: center;
        }
        .btn-print {
            display: block;
            width: 200px;
            margin: 40px auto 0;
            padding: 15px;
            background: #000;
            color: #fff;
            text-align: center;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
        }
        @media print {
            .btn-print { display: none; }
            body { padding: 0; }
            .bill-container { border: none; max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="bill-container">
        <div id="order-id-top" style="text-align: right; font-size: 0.8rem; font-weight: 800; margin-bottom: 5px; color: #777;">
            ORDER #<span id="o-id-top"></span>
        </div>
        <div class="bill-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 25px;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <img src="logo.png" alt="Logo" style="height: 50px;">
                <h1 style="font-size: 1.8rem; letter-spacing: 3px; font-weight: 900; margin: 0;">PYTHON</h1>
            </div>
            <h2 style="font-size: 1.8rem; font-weight: 900; color: var(--primary); margin: 0;">INVOICE</h2>
        </div>

        <div class="bill-info">
            <div class="cust-details">
                <h3>Customer Details</h3>
                <p><strong>Name:</strong> <span id="c-name">Loading...</span></p>
                <p><strong>Address:</strong> <span id="c-address"></span></p>
                <p><strong>Phone:</strong> <span id="c-phone"></span></p>
            </div>
            <div class="order-details">
                <p><strong>Date:</strong> <span id="o-date"></span></p>
                <p><strong>Time:</strong> <span id="o-time"></span></p>
            </div>
        </div>

        <table class="item-table">
            <thead>
                <tr>
                    <th>Item Description</th>
                    <th style="text-align: center;">Qty</th>
                    <th style="text-align: right;">Price</th>
                </tr>
            </thead>
            <tbody id="items-list">
                <!-- Items injected here -->
            </tbody>
        </table>

        <div class="totals-box">
            <div class="total-row">
                <span>Items Total</span>
                <span id="s-total">Rs. 0.00</span>
            </div>
            <div class="total-row">
                <span>Delivery Fee</span>
                <span id="d-fee">Rs. 350.00</span>
            </div>
            <div class="total-row final">
                <span>Grand Total</span>
                <span id="g-total">Rs. 0.00</span>
            </div>
        </div>

        <div class="payment-method">
            PAYMENT METHOD: <span id="p-method">CASH ON DELIVERY</span>
        </div>
    </div>

    <button class="btn-print" onclick="window.print()">PRINT BILL</button>

    <script>
        function loadBill() {
            const params = new URLSearchParams(window.location.search);
            const raw = params.get('data');
            if (!raw) return;

            try {
                const order = JSON.parse(decodeURIComponent(escape(atob(raw))));
                
                document.getElementById('o-id-top').innerText = order.id;
                document.getElementById('o-date').innerText = order.date;
                document.getElementById('o-time').innerText = order.time;
                document.getElementById('c-name').innerText = order.name;
                document.getElementById('c-address').innerText = order.address;
                document.getElementById('c-phone').innerText = order.phone;

                const list = document.getElementById('items-list');
                let sub = 0;

                order.items.forEach(item => {
                    const row = document.createElement('tr');
                    const line = item.price * item.quantity;
                    sub += line;

                    row.innerHTML = `
                        <td>
                            <div class="item-box">
                                <img src="${item.image}" onerror="this.style.display='none'">
                                <div>
                                    <p style="font-weight: 800;">${item.name}</p>
                                    <p style="font-size: 0.8rem; opacity: 0.6;">Size: ${item.size} | Color: ${item.color}</p>
                                </div>
                            </div>
                        </td>
                        <td style="text-align: center;">${item.quantity}</td>
                        <td style="text-align: right; font-weight: 800;">Rs. ${line.toLocaleString()}.00</td>
                    `;
                    list.appendChild(row);
                });

                const delivery = order.delivery || 350;
                document.getElementById('s-total').innerText = `Rs. ${sub.toLocaleString()}.00`;
                document.getElementById('d-fee').innerText = `Rs. ${delivery.toLocaleString()}.00`;
                document.getElementById('g-total').innerText = `Rs. ${(sub + delivery).toLocaleString()}.00`;

            } catch (e) {
                console.error(e);
            }
        }
        window.onload = loadBill;
    </script>
</body>
</html>
