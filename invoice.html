<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Bill - Python Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Anta&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #DC143C;
            --black: #000;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #fff;
            font-family: 'Anta', sans-serif;
            color: #000;
            padding: 40px;
        }
        .bill-container {
            max-width: 800px;
            margin: 0 auto;
            border: 2px solid #eee;
            padding: 40px;
            border-radius: 15px;
        }
        .bill-header {
            text-align: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 30px;
            margin-bottom: 30px;
        }
        .bill-header img {
            height: 80px;
            margin-bottom: 15px;
        }
        .bill-header h1 {
            font-size: 2.5rem;
            letter-spacing: 5px;
            font-weight: 900;
        }
        .bill-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            font-size: 1rem;
        }
        .cust-details h3 {
            color: var(--primary);
            font-size: 1.2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .order-details {
            text-align: right;
        }
        .item-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        .item-table th {
            text-align: left;
            background: #f9f9f9;
            padding: 12px;
            border-bottom: 2px solid #eee;
        }
        .item-table td {
            padding: 15px 12px;
            border-bottom: 1px solid #eee;
        }
        .item-box {
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }
        /* Invoice T-shirt Preview */
        .inv-preview {
            position: relative;
            width: 120px;
            height: 140px;
            background: #f9f9f9;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .inv-t-base {
            position: relative;
            width: 100%;
            height: 100%;
            -webkit-mask-image: url('https://i.ibb.co/NnQrQr7y/T-Shirt.png');
            mask-image: url('https://i.ibb.co/NnQrQr7y/T-Shirt.png');
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
            background-color: #fff;
        }
        .inv-t-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            mix-blend-mode: multiply;
        }
        .inv-sticker {
            position: absolute;
            pointer-events: none;
            transform: translate(-50%, -50%);
        }
        .totals-box {
            margin-left: auto;
            width: 300px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
        }
        .total-row.final {
            border-top: 2px solid #000;
            margin-top: 10px;
            padding-top: 15px;
            font-weight: 900;
            font-size: 1.4rem;
            color: var(--primary);
        }
        .payment-method {
            margin-top: 40px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
            font-weight: 800;
            text-align: center;
        }
        .btn-print {
            display: block;
            width: 200px;
            margin: 40px auto 0;
            padding: 15px;
            background: #000;
            color: #fff;
            text-align: center;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
        }
        @media print {
            .btn-print { display: none; }
            body { padding: 0; }
            .bill-container { border: none; max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="bill-container">
        <div id="order-id-top" style="text-align: right; font-size: 0.8rem; font-weight: 800; margin-bottom: 5px; color: #777;">
            ORDER #<span id="o-id-top"></span>
        </div>
        <div class="bill-header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 25px;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <img src="logo.png" alt="Logo" style="height: 50px;">
                <h1 style="font-size: 1.8rem; letter-spacing: 3px; font-weight: 900; margin: 0;">PYTHON</h1>
            </div>
            <h2 style="font-size: 1.8rem; font-weight: 900; color: var(--primary); margin: 0;">INVOICE</h2>
        </div>

        <div class="bill-info">
            <div class="cust-details">
                <h3>Customer Details</h3>
                <p><strong>Name:</strong> <span id="c-name">Loading...</span></p>
                <p><strong>Address:</strong> <span id="c-address"></span></p>
                <p><strong>Phone:</strong> <span id="c-phone"></span></p>
            </div>
            <div class="order-details">
                <p><strong>Date:</strong> <span id="o-date"></span></p>
                <p><strong>Time:</strong> <span id="o-time"></span></p>
            </div>
        </div>

        <table class="item-table">
            <thead>
                <tr>
                    <th>Item Description</th>
                    <th style="text-align: center;">Qty</th>
                    <th style="text-align: right;">Price</th>
                </tr>
            </thead>
            <tbody id="items-list">
                <!-- Items injected here -->
            </tbody>
        </table>

        <div class="totals-box">
            <div class="total-row">
                <span>Items Total</span>
                <span id="s-total">Rs. 0.00</span>
            </div>
            <div class="total-row">
                <span>Delivery Fee</span>
                <span id="d-fee">Rs. 350.00</span>
            </div>
            <div class="total-row final">
                <span>Grand Total</span>
                <span id="g-total">Rs. 0.00</span>
            </div>
        </div>

        <div class="payment-method">
            PAYMENT METHOD: <span id="p-method">CASH ON DELIVERY</span>
        </div>
    </div>

    <button class="btn-print" onclick="window.print()">PRINT BILL</button>

    <script>
        function loadBill() {
            const params = new URLSearchParams(window.location.search);
            const raw = params.get('data');
            if (!raw) return;

            try {
                const order = JSON.parse(decodeURIComponent(escape(atob(raw))));
                
                document.getElementById('o-id-top').innerText = order.id;
                document.getElementById('o-date').innerText = order.date;
                document.getElementById('o-time').innerText = order.time;
                document.getElementById('c-name').innerText = order.name;
                document.getElementById('c-address').innerText = order.address;
                document.getElementById('c-phone').innerText = order.phone;

                const list = document.getElementById('items-list');
                let sub = 0;

                const stickerMap = {
                    'S1': 'https://i.ibb.co/gMrCJPnN/A3-1.png',
                    'S2': 'https://i.ibb.co/QFRLTykz/A3-2.png',
                    'S3': 'https://i.ibb.co/S7f8ZfJs/A3-3.png',
                    'S4': 'https://i.ibb.co/tMccn0qh/A3-4.png',
                    'S5': 'https://i.ibb.co/B5s9qhyX/A3-5.png',
                    'S6': 'https://i.ibb.co/bj43Hcks/A3-6.png',
                    'S7': 'https://i.ibb.co/7B5DZmx/A3-7.png',
                    'S8': 'https://i.ibb.co/SXdG9PTc/A3-8.png',
                    'S9': 'https://i.ibb.co/tp3krXPp/A3-9.png',
                    'S10': 'https://i.ibb.co/VY90dG3G/A3-10.png',
                    'S11': 'https://i.ibb.co/1JQ00QMd/A3-11.png'
                };

                const colorNames = {
                    '#ffffff': 'White', '#ff0000': 'Red', '#ffff00': 'Yellow',
                    '#000000': 'Black', '#0000ff': 'Blue', '#008000': 'Green'
                };

                order.items.forEach(item => {
                    const row = document.createElement('tr');
                    const line = (item.price || 0) * (item.quantity || 1);
                    sub += line;

                    let previewHtml = '';
                    if (item.isCustom && item.customStickers) {
                        // Base color handling
                        const bgColor = (item.color.startsWith('#')) ? item.color : 
                                       Object.keys(colorNames).find(key => colorNames[key] === item.color) || '#fff';
                        
                        previewHtml = `
                            <div class="inv-preview">
                                <div class="inv-t-base" style="background-color: ${bgColor};">
                                    <img src="https://i.ibb.co/NnQrQr7y/T-Shirt.png" class="inv-t-img">
                                    ${item.customStickers.map(s => {
                                        const url = stickerMap[s.u] || s.u;
                                        return `<img src="${url}" class="inv-sticker" style="top: ${s.t}; left: ${s.l}; width: calc(${s.w} / 4);">`;
                                    }).join('')}
                                </div>
                            </div>
                        `;
                    } else {
                        previewHtml = `<img src="${item.image}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px;">`;
                    }

                    let descriptionHtml = `
                        <div class="item-box">
                            ${previewHtml}
                            <div style="flex: 1;">
                                <p style="font-weight: 800; font-size: 1.1rem; margin-bottom: 5px;">${item.name}</p>
                                <p style="font-size: 0.85rem; opacity: 0.7; margin-bottom: 10px;">
                                    Size: ${item.size || 'Custom'} | Color: ${item.color}
                                </p>
                    `;

                    if (item.isCustom && item.customStickers) {
                        descriptionHtml += `<div style="border-top: 1px solid #eee; padding-top: 10px;">`;
                        item.customStickers.forEach((s, idx) => {
                            const url = stickerMap[s.u] || s.u;
                            descriptionHtml += `
                                <div style="margin-bottom: 8px; display: flex; align-items: center; gap: 15px; font-size: 0.8rem;">
                                    <span style="font-weight: 700;">Design ${idx + 1} (${s.sz || 'A4'})</span>
                                    <a href="${url}" download="design_${idx+1}.png" 
                                       style="color: var(--primary); text-decoration: none; font-weight: 800; font-size: 0.7rem; background: #fff5f5; padding: 4px 10px; border-radius: 5px; border: 1px solid var(--primary);">
                                       DOWNLOAD FILE
                                    </a>
                                </div>
                            `;
                        });
                        descriptionHtml += `</div>`;
                    }
                    
                    descriptionHtml += `</div></div>`;
                    row.innerHTML = `<td>${descriptionHtml}</td><td style="text-align: center;">${item.quantity}</td><td style="text-align: right;">Rs. ${line.toLocaleString()}.00</td>`;
                    list.appendChild(row);
                });

                const delivery = (order.delivery !== undefined) ? order.delivery : 450;
                document.getElementById('s-total').innerText = `Rs. ${sub.toLocaleString()}.00`;
                document.getElementById('d-fee').innerText = delivery === 0 ? 'FREE' : `Rs. ${delivery.toLocaleString()}.00`;
                document.getElementById('g-total').innerText = `Rs. ${(sub + delivery).toLocaleString()}.00`;

            } catch (e) {
                console.error(e);
            }
        }
        window.onload = loadBill;
    </script>
</body>
</html>
