<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Python</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <nav id="navbar" class="scrolled">
        <a href="index.html" class="logo">
            <img src="logo.png" alt="Python Logo">
            <span>PYTHON</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="customize.html">Customize</a></li>
            <li><a href="offers.html">Offers</a></li>
        </ul>
        <div class="nav-icons">
            <a href="login.html"><i data-lucide="user"></i></a>
            <a href="cart.html" style="position: relative;">
                <i data-lucide="shopping-cart"></i>
                <span id="cart-count"
                    style="position: absolute; top: -10px; right: -10px; background: #c8a96e; color: #0A0F1E; font-size: 10px; padding: 2px 5px; border-radius: 50%; font-weight: 800;">0</span>
            </a>
            <a href="#" id="mobile-menu-btn"><i data-lucide="menu"></i></a>
        </div>
    </nav>

    <main class="section" style="padding-top: 150px;">
        <div class="section-title">
            <h2>Secure <span style="color: #ff0000;">Checkout</span></h2>
        </div>

        <div class="checkout-grid" style="max-width: 1200px; margin: 0 auto;">
            <div class="glass checkout-form" style="padding: 40px;">
                <h3 style="margin-bottom: 30px;">Shipping Details</h3>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="checkout-address" placeholder="123 Street Name">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" id="checkout-city" placeholder="Colombo">
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" id="checkout-phone" placeholder="07XXXXXXXX">
                    </div>
                </div>

                <h3 style="margin: 40px 0 20px;">Payment Method</h3>
                <div style="display: flex; gap: 20px;">
                    <label class="glass"
                        style="padding: 20px; flex: 1; cursor: pointer; display: flex; align-items: center; gap: 10px;">
                        <input type="radio" name="payment" checked>
                        Cash on Delivery
                    </label>
                </div>

                <button class="btn btn-primary" style="width: 100%; margin-top: 40px;"
                    onclick="placeOrder()">Complete Order</button>
            </div>

            <div class="glass" style="padding: 40px; height: fit-content;">
                <h3 style="margin-bottom: 30px;">Order Summary</h3>
                <div id="checkout-items"></div>
                <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 20px 0;">
                <div style="display: flex; justify-content: space-between; font-weight: 800; font-size: 1.2rem;">
                    <span>Total</span>
                    <span id="checkout-total" style="color: #c8a96e;">Rs. 0.00</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
    <script>
        lucide.createIcons();
        document.addEventListener('DOMContentLoaded', () => {
            const cart = JSON.parse(localStorage.getItem('python_cart')) || [];
            const container = document.getElementById('checkout-items');
            let subtotal = 0;
            let itemCount = 0;

            cart.forEach(item => {
                subtotal += item.price * item.quantity;
                itemCount += item.quantity;
                container.innerHTML += `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem;">
                        <span>${item.name} x ${item.quantity}</span>
                        <span>Rs. ${(item.price * item.quantity).toLocaleString()}</span>
                    </div>
                `;
            });

            const deliveryFee = itemCount > 3 ? 0 : 450;
            const grandTotal = subtotal + deliveryFee;

            container.innerHTML += `
                <div style="display: flex; justify-content: space-between; margin-top: 15px; color: var(--text-muted); font-size: 0.9rem;">
                    <span>Delivery Fee ${itemCount > 3 ? '(Free Promo)' : ''}</span>
                    <span>${deliveryFee === 0 ? 'FREE' : 'Rs. ' + deliveryFee.toLocaleString()}</span>
                </div>
                ${itemCount <= 3 ? `<p style="font-size: 0.7rem; color: #DC143C; margin-top: 5px;">Add ${4 - itemCount} more item(s) for FREE delivery!</p>` : ''}
            `;

            document.getElementById('checkout-total').innerText = `Rs. ${grandTotal.toLocaleString()}.00`;
        });
    </script>
</body>

</html>
