<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Python</title>
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <nav id="navbar">
        <a href="index.html" class="logo">
            <img src="logo.png" alt="Python Logo">
            <span>PYTHON</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html" class="active">Shop</a></li>
            <li><a href="customize.html">Customize</a></li>
            <li><a href="offers.html">Offers</a></li>
        </ul>
        <div class="nav-icons">
            <a href="https://www.instagram.com/" target="_blank"><i data-lucide="instagram"></i></a>
            <a href="https://www.facebook.com/" target="_blank"><i data-lucide="facebook"></i></a>
            <a href="profile.html"><i data-lucide="user"></i></a>
            <a href="cart.html" style="position: relative;">
                <i data-lucide="shopping-cart"></i>
                <span id="cart-count"
                    style="position: absolute; top: -10px; right: -10px; background: var(--accent-gold); color: white; font-size: 10px; padding: 2px 5px; border-radius: 50%; font-weight: 800;">0</span>
            </a>
            <a href="#" id="mobile-menu-btn"><i data-lucide="menu"></i></a>
        </div>
    </nav>

    <div class="menu-overlay" id="menu-overlay"></div>
    <div class="mobile-menu" id="mobile-menu">
        <div class="close-menu" id="close-menu"><i data-lucide="x"></i></div>
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="customize.html">Customize</a>
        <a href="offers.html">Offers</a>
        <a href="profile.html">My Account</a>
        <a href="cart.html">Cart</a>
    </div>

    <main class="section" style="padding-top: 150px;">
        <div class="section-title">
            <h2>Our <span style="color: #ff0000;">Shop</span></h2>
            <p>Browse through our exclusive T-shirt collection</p>
        </div>

        <!-- Primary Section Tabs -->
        <div class="section-tabs"
            style="display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; flex-wrap: wrap;">
            <button class="tab-btn active" onclick="selectSection('All', this)">All</button>
            <button class="tab-btn" onclick="selectSection('Kids', this)">Kids</button>
            <button class="tab-btn" onclick="selectSection('Mens', this)">Mens</button>
            <button class="tab-btn" onclick="selectSection('Womens', this)">Womens</button>
            <button class="tab-btn" onclick="selectSection('Unisexs', this)">Unisexs</button>
        </div>

        <!-- Subcategory Filters -->
        <div class="category-filter"
            style="display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; flex-wrap: wrap;">
            <button class="filter-btn active" onclick="selectSubcategory('All', this)">All Subcategories</button>
            <button class="filter-btn" onclick="selectSubcategory('Regular Tee (Printed)', this)">Regular Tee (Printed)</button>
            <button class="filter-btn" onclick="selectSubcategory('Oversized Tee (Printed)', this)">Oversized Tee (Printed)</button>
        </div>

        <div class="product-grid" id="product-grid">
            <!-- Products will be here -->
        </div>
    </main>



    <!-- Size Chart Modal -->
    <div id="sizeChartModal" class="modal-overlay" onclick="closeSizeChart()"
        style="display:none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); align-items: center; justify-content: center;">
        <div class="glass"
            style="max-width: 90%; max-height: 90%; position: relative; padding: 10px; background: white; border-radius: 20px;"
            onclick="event.stopPropagation()">
            <span onclick="closeSizeChart()"
                style="position: absolute; right: -15px; top: -15px; background: #DC143C; color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(220, 20, 60, 0.3);">&times;</span>
            <img src="https://i.ibb.co/pvGrdQMD/Size-Chart-01.jpg" alt="Size Chart"
                style="width: 100%; height: auto; max-height: 80vh; border-radius: 15px; display: block;">
        </div>
    </div>

    <style>
        .product-card:hover .size-chart-card-btn {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        .size-chart-card-btn:hover {
            background: #000 !important;
            color: #fff !important;
        }

        .modal-overlay.active {
            display: flex !important;
        }
    </style>

    <footer class="footer">
        <!-- Footer content -->
    </footer>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
        function openSizeChart() {
            document.getElementById('sizeChartModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeSizeChart() {
            document.getElementById('sizeChartModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>

</html>
