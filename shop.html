<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Python</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav id="navbar">
        <a href="index.html" class="logo">
            <img src="logo.png" alt="Python Logo">
            <span>PYTHON</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html" class="active">Shop</a></li>
            <li><a href="customize.html">Customize</a></li>
            <li><a href="offers.html">Offers</a></li>
        </ul>
        <div class="nav-icons">
            <a href="login.html"><i data-lucide="user"></i></a>
            <a href="cart.html" style="position: relative;">
                <i data-lucide="shopping-cart"></i>
                <span id="cart-count" style="position: absolute; top: -10px; right: -10px; background: #c8a96e; color: #0A0F1E; font-size: 10px; padding: 2px 5px; border-radius: 50%; font-weight: 800;">0</span>
            </a>
            <a href="#" id="mobile-menu-btn"><i data-lucide="menu"></i></a>
        </div>
    </nav>

<main class="section" style="padding-top: 150px;">
    <div class="section-title">
        <h2>Our <span style="color: #c8a96e;">Shop</span></h2>
        <p>Browse through our exclusive T-shirt collection</p>
    </div>

    <div class="product-grid" id="product-grid">
        <!-- Products will be here -->
    </div>
</main>

<script>
    const products = [
        {name: 'Python Classic Black', price: 2450, img: 'https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?w=600'},
        {name: 'Infinity Edition White', price: 2850, img: 'https://images.unsplash.com/photo-1576566588028-4147f3842f27?w=600'},
        {name: 'Gold Signature Tee', price: 3200, img: 'https://images.unsplash.com/photo-1618354691373-d851c5c3a990?w=600'},
        {name: 'Arctic Python Blue', price: 2650, img: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600'},
        {name: 'Midnight Stealth', price: 2950, img: 'https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?w=600'},
        {name: 'Retro Python Graphic', price: 2750, img: 'https://images.unsplash.com/photo-1562157873-818bc0726f68?w=600'},
        {name: 'Minimalist Vibe', price: 2200, img: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600'},
        {name: 'Oversized Streetwear', price: 3500, img: 'https://images.unsplash.com/photo-1554568218-0f1715e72254?w=600'}
    ];

    const grid = document.getElementById('product-grid');
    products.forEach(p => {
        grid.innerHTML += `
            <div class="product-card glass">
                <div class="product-image">
                    <img src="${p.img}" alt="${p.name}">
                </div>
                <div class="product-info">
                    <h3>${p.name}</h3>
                    <p class="price">Rs. ${p.price.toLocaleString()}.00</p>
                </div>
                <div class="add-to-cart" onclick="addToCart('${p.name}', ${p.price})">
                    <i data-lucide="plus"></i>
                </div>
            </div>`;
    });
</script>

    <footer class="footer">
        <!-- Footer content (same as above) -->
    </footer>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
