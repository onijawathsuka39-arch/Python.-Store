<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Python</title>
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <nav id="navbar">
        <a href="index.html" class="logo">
            <img src="logo.png" alt="Python Logo">
            <span>PYTHON</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html" class="active">Shop</a></li>
            <li><a href="customize.html">Customize</a></li>
            <li><a href="offers.html">Offers</a></li>
        </ul>
        <div class="nav-icons">
            <a href="https://www.instagram.com/" target="_blank"><i data-lucide="instagram"></i></a>
            <a href="https://www.facebook.com/" target="_blank"><i data-lucide="facebook"></i></a>
            <a href="profile.html"><i data-lucide="user"></i></a>
            <a href="wishlist.html" style="position: relative; margin-right: 5px;">
                <i data-lucide="heart"></i>
                <span id="wishlist-count"
                    style="position: absolute; top: -10px; right: -10px; background: #DC143C; color: white; font-size: 10px; padding: 2px 5px; border-radius: 50%; font-weight: 800;">0</span>
            </a>
            <a href="cart.html" style="position: relative;">
                <i data-lucide="shopping-cart"></i>
                <span id="cart-count"
                    style="position: absolute; top: -10px; right: -10px; background: var(--accent-gold); color: white; font-size: 10px; padding: 2px 5px; border-radius: 50%; font-weight: 800;">0</span>
            </a>
            <a href="#" id="mobile-menu-btn"><i data-lucide="menu"></i></a>
        </div>
    </nav>

    <div class="menu-overlay" id="menu-overlay"></div>
    <div class="mobile-menu" id="mobile-menu">
        <div class="close-menu" id="close-menu"><i data-lucide="x"></i></div>
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="customize.html">Customize</a>
        <a href="offers.html">Offers</a>
        <a href="wishlist.html">Wishlist</a>
        <a href="profile.html">My Account</a>
        <a href="cart.html">Cart</a>
    </div>

    <main class="section" style="padding-top: 150px;">
        <div class="section-title">
            <h2>Our <span style="color: #ff0000;">Shop</span></h2>
            <p>Browse through our exclusive T-shirt collection</p>
        </div>

        <!-- Search Bar -->
        <div class="search-container" style="max-width: 300px; margin: 0 0 30px auto; position: relative;">
            <input type="text" id="shop-search" placeholder="Search (e.g. t-shirt, kids)..." oninput="handleSearch(this.value)"
                style="width: 100%; padding: 12px 15px 12px 42px; border-radius: 50px; border: 1px solid var(--border-color); background: var(--surface); color: var(--primary-dark); font-size: 0.9rem; box-shadow: 0 5px 15px rgba(0,0,0,0.05); outline: none; transition: var(--transition-smooth);">
            <i data-lucide="search" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 18px; height: 18px; pointer-events: none;"></i>
        </div>

        <!-- Category Filters -->
        <div class="category-filter"
            style="display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;">
            <button class="filter-btn active" id="btn-all" onclick="selectMainCat('All', this)">All T-Shirts</button>
            <button class="filter-btn" id="btn-regular" onclick="selectMainCat('Regular Tee (Printed)', this)">Regular Tee (Printed)</button>
            <button class="filter-btn" id="btn-oversized" onclick="selectMainCat('Oversized Tee (Printed)', this)">Oversized Tee (Printed)</button>
            <button class="filter-btn" id="btn-waffle" onclick="selectMainCat('Waffle T-shirts', this)">Waffle T-shirts</button>
        </div>

        <!-- GSM sub-category row — always visible -->
        <div id="gsm-subcat-row" style="display: flex; justify-content: center; gap: 8px; margin-bottom: 35px; flex-wrap: wrap; align-items: center;">
            <span style="font-size: 0.72rem; font-weight: 800; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase;">GSM :</span>
            <button class="filter-btn gsm-sub active" id="gsm-all" onclick="selectGSM('all', this)">All</button>
            <button class="filter-btn gsm-sub" id="gsm-220" onclick="selectGSM('220 GSM', this)">220 GSM</button>
            <button class="filter-btn gsm-sub" id="gsm-190" onclick="selectGSM('190 GSM', this)">190 GSM</button>
            <button class="filter-btn gsm-sub" id="gsm-240" onclick="selectGSM('240 GSM', this)">240 GSM</button>
        </div>

        <div class="product-grid" id="product-grid">
            <!-- Products will be here -->
        </div>
    </main>



    <!-- Size Chart Modal -->
    <div id="sizeChartModal" class="modal-overlay" onclick="closeSizeChart()"
        style="display:none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); align-items: center; justify-content: center;">
        <div class="glass"
            style="max-width: 90%; max-height: 90%; position: relative; padding: 10px; background: white; border-radius: 20px;"
            onclick="event.stopPropagation()">
            <span onclick="closeSizeChart()"
                style="position: absolute; right: -15px; top: -15px; background: #DC143C; color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(220, 20, 60, 0.3);">&times;</span>
            <img src="https://i.ibb.co/pvGrdQMD/Size-Chart-01.jpg" alt="Size Chart"
                style="width: 100%; height: auto; max-height: 80vh; border-radius: 15px; display: block;">
        </div>
    </div>

    <style>
        /* GSM sub-category buttons — outline only, no fill */
        .gsm-sub {
            padding: 5px 14px !important;
            border-radius: 50px !important;
            border: 1.5px solid #333 !important;
            background: transparent !important;
            color: var(--primary-dark) !important;
            font-size: 0.75rem !important;
            font-weight: 700 !important;
            box-shadow: none !important;
            transform: none !important;
        }
        .gsm-sub:hover {
            border-color: #DC143C !important;
            color: #DC143C !important;
            background: transparent !important;
            box-shadow: none !important;
            transform: none !important;
        }
        .gsm-sub.active {
            border-color: #DC143C !important;
            color: #DC143C !important;
            background: transparent !important;
            box-shadow: none !important;
            transform: none !important;
        }

        .product-card:hover .size-chart-card-btn {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        .size-chart-card-btn:hover {
            background: #000 !important;
            color: #fff !important;
        }

        .modal-overlay.active {
            display: flex !important;
        }

        #shop-search:focus {
            border-color: var(--accent-gold) !important;
            box-shadow: 0 10px 25px rgba(220, 20, 60, 0.15) !important;
        }
    </style>

    <footer class="footer">
        <!-- Footer content -->
    </footer>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();

        // ── GSM Sub-category filter logic ──────────────────────────
        let activeMainCat = 'All';
        let activeGSM = 'all';

        function selectMainCat(cat, btn) {
            activeMainCat = cat;
            activeGSM = 'all'; // reset GSM on category change

            // Update main filter buttons
            document.querySelectorAll('.category-filter .filter-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');

            // Reset GSM buttons to All
            document.querySelectorAll('.gsm-sub').forEach(b => b.classList.remove('active'));
            const gsmAllBtn = document.getElementById('gsm-all');
            if (gsmAllBtn) gsmAllBtn.classList.add('active');

            currentSubcategory = cat;
            applyFilters();
        }

        function selectGSM(gsm, btn) {
            activeGSM = gsm;
            document.querySelectorAll('.gsm-sub').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            let filtered = products;

            // Main category filter
            if (activeMainCat !== 'All') {
                filtered = filtered.filter(p => p.category === activeMainCat);
            }

            // GSM filter — applies to all categories
            if (activeGSM !== 'all') {
                filtered = filtered.filter(p => p.gsm === activeGSM);
            }

            // Search query
            if (searchQuery !== '') {
                filtered = filtered.filter(p =>
                    p.name.toLowerCase().includes(searchQuery) ||
                    (p.desc || '').toLowerCase().includes(searchQuery) ||
                    (p.category || '').toLowerCase().includes(searchQuery)
                );
            }

            displayProducts(filtered);
        }
        // ────────────────────────────────────────────────────────────

        function openSizeChart() {
            document.getElementById('sizeChartModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeSizeChart() {
            document.getElementById('sizeChartModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>

</html>
