<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Python</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <nav id="navbar" class="scrolled">
        <a href="index.html" class="logo">
            <img src="logo.png" alt="Python Logo">
            <span>PYTHON</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="customize.html">Customize</a></li>
            <li><a href="offers.html">Offers</a></li>
        </ul>
        <div class="nav-icons">
            <a href="login.html" class="active"><i data-lucide="user"></i></a>
            <a href="cart.html" style="position: relative;">
                <i data-lucide="shopping-cart"></i>
                <span id="cart-count"
                    style="position: absolute; top: -10px; right: -10px; background: #c8a96e; color: #0A0F1E; font-size: 10px; padding: 2px 5px; border-radius: 50%; font-weight: 800;">0</span>
            </a>
            <a href="#" id="mobile-menu-btn"><i data-lucide="menu"></i></a>
        </div>
    </nav>

    <!-- Loading Overlay -->
    <div id="auth-loading" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:99999; flex-direction:column; align-items:center; justify-content:center; gap:18px;">
        <div style="width:54px;height:54px;border:5px solid rgba(200,169,110,0.3);border-top:5px solid #c8a96e;border-radius:50%;animation:spin 0.7s linear infinite;"></div>
        <p style="color:#fff;font-size:1.1rem;font-weight:700;letter-spacing:1px;">Please Wait...</p>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>

    <main class="section" style="padding-top: 100px;">
        <div class="auth-form glass">
            <h2 style="text-align: center; margin-bottom: 30px;">Welcome <span style="color: #c8a96e;">Back</span></h2>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="email@example.com" onkeydown="if(event.key==='Enter') doLogin()">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()">
            </div>
            <div id="login-error" style="display:none; background:#fdf2f2; color:#9b1c1c; padding:10px 15px; border-radius:10px; font-size:0.88rem; margin-bottom:10px; border-left:4px solid #DC143C;"></div>
            <button id="login-btn" class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="doLogin()">Sign In</button>
            <p style="text-align: center; margin-top: 20px; color: var(--text-muted);">
                Don't have an account? <a href="signup.html" style="color: #ff0000;">Create one</a>
            </p>
        </div>
    </main>
    <script>
    function doLogin() {
        const email = document.getElementById('login-email').value.trim();
        const pass  = document.getElementById('login-pass').value;
        const errEl = document.getElementById('login-error');
        const btn   = document.getElementById('login-btn');
        errEl.style.display = 'none';
        if (!email || !pass) { errEl.textContent = '⚠️ Email සහ Password ඇතුළත් කරන්න.'; errEl.style.display='block'; return; }
        document.getElementById('auth-loading').style.display = 'flex';
        btn.disabled = true;
        login(email, pass, function(errMsg) {
            document.getElementById('auth-loading').style.display = 'none';
            btn.disabled = false;
            errEl.textContent = '⚠️ ' + errMsg;
            errEl.style.display = 'block';
        });
    }
    </script>

    <footer class="footer">
        <div class="footer-grid">
            <div class="footer-col">
                <h4 style="color: #ff0000; font-weight: 800;">PYTHON</h4>
                <p>Elevate your style with our premium, high-quality t-shirt collections.</p>
                <div class="social-links">
                    <a href="#"><i data-lucide="instagram"></i></a>
                    <a href="#"><i data-lucide="facebook"></i></a>
                </div>
            </div>
            <div class="footer-col">
                <h4>Contact Us</h4>
                <p>Call: 0757218786</p>
                <p>Email: roohira@gmail.com</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Python. Powered by Roohira Collection</p>
        </div>
    </footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
