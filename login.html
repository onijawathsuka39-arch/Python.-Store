<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Python</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <nav id="navbar" class="scrolled">
        <a href="index.html" class="logo">
            <img src="logo.png" alt="Python Logo">
            <span>PYTHON</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="customize.html">Customize</a></li>
            <li><a href="offers.html">Offers</a></li>
        </ul>
        <div class="nav-icons">
            <a href="login.html" class="active"><i data-lucide="user"></i></a>
            <a href="cart.html" style="position: relative;">
                <i data-lucide="shopping-cart"></i>
                <span id="cart-count"
                    style="position: absolute; top: -10px; right: -10px; background: #c8a96e; color: #0A0F1E; font-size: 10px; padding: 2px 5px; border-radius: 50%; font-weight: 800;">0</span>
            </a>
            <a href="#" id="mobile-menu-btn"><i data-lucide="menu"></i></a>
        </div>
    </nav>

    <main class="section" style="padding-top: 100px;">
        <div class="auth-form glass">
            <h2 style="text-align: center; margin-bottom: 30px;">Welcome <span style="color: #c8a96e;">Back</span></h2>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="email@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-pass" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" style="width: 100%; margin-top: 10px;"
                onclick="login(document.getElementById('login-email').value, document.getElementById('login-pass').value)">Sign In</button>
            <p style="text-align: center; margin-top: 20px; color: var(--text-muted);">
                Don't have an account? <a href="signup.html" style="color: #ff0000;">Create one</a>
            </p>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-grid">
            <div class="footer-col">
                <h4 style="color: #ff0000; font-weight: 800;">PYTHON</h4>
                <p>Elevate your style with our premium, high-quality t-shirt collections.</p>
                <div class="social-links">
                    <a href="#"><i data-lucide="instagram"></i></a>
                    <a href="#"><i data-lucide="facebook"></i></a>
                </div>
            </div>
            <div class="footer-col">
                <h4>Contact Us</h4>
                <p>Call: 0757218786</p>
                <p>Email: roohira@gmail.com</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Python. Powered by Roohira Collection</p>
        </div>
    </footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
