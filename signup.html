<main class="section" style="padding-top: 100px;">
    <div class="auth-form glass">
        <h2 style="text-align: center; margin-bottom: 30px;">Join <span style="color: #c8a96e;">Python</span></h2>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="signup-name" placeholder="John Doe">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="signup-email" placeholder="email@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="signup-pass" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="signup(document.getElementById('signup-name').value, document.getElementById('signup-email').value, '')">Create Account</button>
        <p style="text-align: center; margin-top: 20px; color: var(--text-muted);">
            Already have an account? <a href="login.html" style="color: #c8a96e;">Sign in</a>
        </p>
    </div>
</main>
