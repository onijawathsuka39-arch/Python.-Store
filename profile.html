<head>

    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <nav id="navbar" class="scrolled">
        <a href="index.html" class="logo">
            <img src="logo.png" alt="Python Logo">
            <span>PYTHON</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="customize.html">Customize</a></li>
            <li><a href="offers.html">Offers</a></li>
        </ul>
        <div class="nav-icons">
            <a href="https://www.instagram.com/" target="_blank"><i data-lucide="instagram"></i></a>
            <a href="https://www.facebook.com/" target="_blank"><i data-lucide="facebook"></i></a>
            <a href="profile.html" class="active"><i data-lucide="user"></i></a>
            <a href="wishlist.html" style="position: relative; margin-right: 5px;">
                <i data-lucide="heart"></i>
                <span id="wishlist-count"
                    style="position: absolute; top: -10px; right: -10px; background: #DC143C; color: white; font-size: 10px; padding: 2px 5px; border-radius: 50%; font-weight: 800;">0</span>
            </a>
            <a href="cart.html" style="position: relative;">
                <i data-lucide="shopping-cart"></i>
                <span id="cart-count"
                    style="position: absolute; top: -10px; right: -10px; background: #c8a96e; color: #0A0F1E; font-size: 10px; padding: 2px 5px; border-radius: 50%; font-weight: 800;">0</span>
            </a>
            <a href="#" id="mobile-menu-btn"><i data-lucide="menu"></i></a>
        </div>
    </nav>

    <div class="menu-overlay" id="menu-overlay"></div>
    <div class="mobile-menu" id="mobile-menu">
        <div class="close-menu" id="close-menu"><i data-lucide="x"></i></div>
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="customize.html">Customize</a>
        <a href="offers.html">Offers</a>
        <a href="wishlist.html">Wishlist</a>
        <a href="profile.html">My Account</a>
        <a href="cart.html">Cart</a>
    </div>

    <main class="section" style="padding-top: 150px;">
        <div id="profile-content" style="max-width: 800px; margin: 0 auto;">
            <div class="glass" style="padding: 40px; text-align: center;">
                <div style="width: 100px; height: 100px; background: var(--accent-gold); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; color: #0A0F1E; font-size: 3rem; font-weight: 800;"
                    id="profile-initial">
                    U
                </div>
                <h2 id="profile-name">User Name</h2>
                <p id="profile-email" style="color: var(--text-muted);">email@example.com</p>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px;">
                    <div class="glass" style="padding: 20px; cursor: pointer;" onclick="window.location.href='order-history.html'">
                        <h3 style="color: var(--accent-gold);" id="order-count">0</h3>
                        <p>Total Orders (View History)</p>
                    </div>
                    <div class="glass" style="padding: 20px; cursor: pointer;" onclick="window.location.href='wishlist.html'">
                        <h3 style="color: var(--accent-gold);" id="profile-wishlist-count">0</h3>
                        <p>Wishlist</p>
                    </div>
                </div>

                <div style="margin-top: 40px;">
                    <a href="order-history.html" class="btn btn-primary" style="text-decoration:none; display:flex; align-items:center; justify-content:center; gap:8px;">
                        <i data-lucide="package" style="width:18px;"></i> View Detailed Order History
                    </a>
                </div>

                <button class="btn btn-outline" style="margin-top: 40px; width: 100%;" onclick="logout()">Sign
                    Out</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 Python. Powered by Roohira Collection</p>
        </div>
    </footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
    <script>
        lucide.createIcons();

        // Use Firebase Auth state to protect this page
        if (typeof auth !== 'undefined' && auth) {
            auth.onAuthStateChanged(function(firebaseUser) {
                if (!firebaseUser) {
                    // Not logged in — redirect to login
                    window.location.href = 'login.html';
                    return;
                }
                // Fetch profile from Firestore
                db.collection('users').doc(firebaseUser.uid).get().then(function(doc) {
                    const name = doc.exists ? doc.data().name : firebaseUser.email.split('@')[0];
                    document.getElementById('profile-name').innerText = name;
                    document.getElementById('profile-email').innerText = firebaseUser.email;
                    document.getElementById('profile-initial').innerText = name.charAt(0).toUpperCase();
                    // Set dynamic wishlist length
                    const wl = JSON.parse(localStorage.getItem('python_wishlist')) || [];
                    document.getElementById('profile-wishlist-count').innerText = wl.length;
                    // Load orders
                    if (typeof loadProfile === 'function') loadProfile();
                });
            });
        } else {
            // Fallback to localStorage if Firebase not configured yet
            document.addEventListener('DOMContentLoaded', function() {
                const user = JSON.parse(localStorage.getItem('python_user'));
                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }
                document.getElementById('profile-name').innerText = user.name;
                document.getElementById('profile-email').innerText = user.email;
                document.getElementById('profile-initial').innerText = user.name.charAt(0).toUpperCase();
                const wl = JSON.parse(localStorage.getItem('python_wishlist')) || [];
                document.getElementById('profile-wishlist-count').innerText = wl.length;
            });
        }
    </script>
</body>

</html>
